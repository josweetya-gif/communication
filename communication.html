<!DOCTYPE html>
<html>
<head>
<title>Real-Time Chat Application</title>

<style>

body{
font-family: Arial, sans-serif;
background-image:url("https://images.unsplash.com/photo-1519389950473-47ba0277781c");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.9);
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
}

.chat-header{
background:#4a6ee0;
color:white;
padding:15px;
text-align:center;
font-size:18px;
border-radius:12px 12px 0 0;
}

.chatbox{
height:350px;
overflow-y:auto;
padding:10px;
}

.message{
display:flex;
margin:8px 0;
animation:fadeIn 0.4s ease;
}

.message img{
width:35px;
height:35px;
border-radius:50%;
margin-right:8px;
}

.bubble{
background:#f1f1f1;
padding:8px 12px;
border-radius:10px;
max-width:220px;
}

.user .bubble{
background:#d0e6ff;
}

.friend .bubble{
background:#e6ffd8;
}

.timestamp{
font-size:10px;
color:gray;
margin-top:2px;
}

.typing{
font-size:12px;
color:#333;
padding-left:10px;
padding-bottom:5px;
}

.input-area{
display:flex;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
padding:10px;
border:none;
background:#4a6ee0;
color:white;
cursor:pointer;
}

button:hover{
background:#3552b8;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* Mobile Responsive */

@media(max-width:500px){
.chatbox{
height:300px;
}
}

.image-message{
max-width:150px;
border-radius:8px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
Real-Time Chat Demo
</div>

<div id="chatbox" class="chatbox"></div>

<div id="typing" class="typing"></div>

<div class="input-area">
<input type="text" id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
<button onclick="sendImage()">Image</button>
</div>

</div>

<script>

var chatbox=document.getElementById("chatbox");
var input=document.getElementById("messageInput");
var typing=document.getElementById("typing");

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

input.addEventListener("input",function(){
typing.innerText="Friend is typing...";
setTimeout(()=>typing.innerText="",1000);
});

function getTime(){
var now=new Date();
return now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');
}

function createMessage(text,type){

var msg=document.createElement("div");
msg.className="message "+type;

var avatar=document.createElement("img");

if(type==="user"){
avatar.src="https://cdn-icons-png.flaticon.com/512/149/149071.png";
}else{
avatar.src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png";
}

var bubble=document.createElement("div");
bubble.className="bubble";

bubble.innerHTML=text+"<div class='timestamp'>"+getTime()+"</div>";

msg.appendChild(avatar);
msg.appendChild(bubble);

chatbox.appendChild(msg);

chatbox.scrollTop=chatbox.scrollHeight;

}

function sendMessage(){

var text=input.value;

if(text.trim()===""){
alert("Type something");
return;
}

createMessage(text,"user");

input.value="";

typing.innerText="Friend is typing...";

setTimeout(()=>{
typing.innerText="";
createMessage("Reply: "+text,"friend");
},1500);

}

function sendImage(){

var imageURL=prompt("Paste image URL");

if(imageURL){

var msg=document.createElement("div");
msg.className="message user";

var avatar=document.createElement("img");
avatar.src="https://cdn-icons-png.flaticon.com/512/149/149071.png";

var bubble=document.createElement("div");
bubble.className="bubble";

bubble.innerHTML="<img src='"+imageURL+"' class='image-message'><div class='timestamp'>"+getTime()+"</div>";

msg.appendChild(avatar);
msg.appendChild(bubble);

chatbox.appendChild(msg);

chatbox.scrollTop=chatbox.scrollHeight;

}

}

</script>

</body>
</html>
